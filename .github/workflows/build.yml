name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ALL system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev python3-pip build-essential \
            libssl-dev libffi-dev zlib1g-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev \
            libsqlite3-dev libgdbm-dev libdb5.3-dev libbz2-dev \
            libexpat1-dev liblzma-dev tk-dev \
            openjdk-17-jdk wget unzip zip \
            autoconf libtool cmake git

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install cython buildozer virtualenv

      - name: Set up Android SDK
        run: |
          mkdir -p /opt/android-sdk/cmdline-tools
          cd /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" > /dev/null 2>&1
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-31" > /dev/null 2>&1
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3" > /dev/null 2>&1
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;31.0.0" > /dev/null 2>&1
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV
          mkdir -p /home/runner/.buildozer/android/platform
          ln -sf /opt/android-sdk /home/runner/.buildozer/android/platform/android-sdk
          mkdir -p /opt/android-sdk/tools/bin
          ln -sf /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager /opt/android-sdk/tools/bin/sdkmanager

      - name: Download NDK 25b
        run: |
          mkdir -p /home/runner/.buildozer/android/platform
          cd /home/runner/.buildozer/android/platform
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          rm android-ndk-r25b-linux.zip
          echo "ANDROIDNDK=/home/runner/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/home/runner/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV

      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = TG WS Proxy' >> buildozer.spec
          echo 'package.name = tgwsproxy' >> buildozer.spec
          echo 'package.domain = com.tgwsproxy' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'source.include_exts = py' >> buildozer.spec
          echo 'version = 1.0.0' >> buildozer.spec
          echo 'requirements = python3,aiohttp,pycryptodome,websockets' >> buildozer.spec
          echo 'orientation = portrait' >> buildozer.spec
          echo 'fullscreen = 0' >> buildozer.spec
          echo 'android.permissions = INTERNET, FOREGROUND_SERVICE' >> buildozer.spec
          echo 'android.api = 31' >> buildozer.spec
          echo 'android.minapi = 26' >> buildozer.spec
          echo 'android.ndk = 25b' >> buildozer.spec
          echo '' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec
          echo 'warn_on_root = 1' >> buildozer.spec
          echo 'build_dir = ./.buildozer' >> buildozer.spec
          echo 'bin_dir = ./bin' >> buildozer.spec
          echo 'android.accept_sdk_license = True' >> buildozer.spec
          echo 'android.archs = arm64-v8a' >> buildozer.spec
          echo 'android.sdk_path = /opt/android-sdk' >> buildozer.spec
          echo 'android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r25b' >> buildozer.spec

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export ANDROIDNDK=/home/runner/.buildozer/android/platform/android-ndk-r25b
          export ANDROID_NDK_HOME=/home/runner/.buildozer/android/platform/android-ndk-r25b
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:/opt/android-sdk/tools/bin
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-android
          path: bin/*.apk

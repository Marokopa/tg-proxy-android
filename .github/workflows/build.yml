name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pip build-essential
          sudo apt-get install -y libssl-dev libffi-dev zlib1g-dev
          sudo apt-get install -y openjdk-17-jdk wget unzip zip

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'SPEC'
[app]
title = TG WS Proxy
package.name = tgwsproxy
package.domain = com.tgwsproxy
source.dir = .
source.include_exts = py
version = 1.0.0
requirements = python3,aiohttp,pycryptodome,websockets
orientation = portrait
fullscreen = 0
android.permissions = INTERNET, FOREGROUND_SERVICE
android.api = 31
android.minapi = 26
android.ndk = 23b

[buildozer]
log_level = 2
warn_on_root = 1
build_dir = ./.buildozer
bin_dir = ./bin
android.accept_sdk_license = True
android.archs = arm64-v8a, armeabi-v7a
SPEC

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: tg-ws-proxy-android
          path: bin/*.apk
